apiVersion: v1
kind: ConfigMap
metadata:
  name: notifications-api-config
  namespace: fcg
data:
  # Service-specific config. Kafka bootstrap comes from the shared `fcg-config`.
  Kafka__UserCreatedTopic: "fcg.users.created"
  Kafka__PaymentProcessedTopic: "fcg.payments.processed"
  Kafka__ConsumerGroup: "notifications-service"
